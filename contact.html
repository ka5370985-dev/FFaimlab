<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FF Aim Lab</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --primary-red: #e63946;
            --primary-orange: #ff9f1c;
            --neon-yellow: #ffd166;
            --dark-bg: #0a0f1a;
            --card-bg: #1e2a3a;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(230, 57, 70, 0.05) 0%, transparent 80%),
                linear-gradient(rgba(10, 15, 26, 0.95), rgba(10, 15, 26, 0.95)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill-rule='evenodd' stroke='%231e2a3a' stroke-width='1' fill='none'/%3E%3C/svg%3E");
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(230, 57, 70, 0.4));
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--primary-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(230, 57, 70, 0.5);
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            text-align: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-red), var(--primary-orange));
        }

        .contact-method {
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-method:last-child {
            border-bottom: none;
        }

        .contact-method i {
            font-size: 2.5rem;
            color: var(--primary-orange);
            margin-bottom: 15px;
        }

        .contact-method h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text-white);
        }

        .contact-method p {
            font-size: 1.2rem;
            color: var(--primary-red);
            font-weight: 700;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-white);
            text-decoration: none;
            font-size: 1.2rem;
            background: #24292e;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
            margin-top: 5px;
        }

        .social-link:hover {
            background: #333;
            transform: scale(1.05);
        }

        .response-time {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-gray);
            font-style: italic;
        }

        footer {
            text-align: center;
            margin-top: 40px;
        }

        .back-link {
            color: var(--text-gray);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
        }

        .back-link:hover {
            color: var(--primary-red);
            border-color: var(--primary-red);
            background: rgba(230, 57, 70, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="FF AIM LAB" class="main-logo">
        <h1>Contact Us</h1>
    </header>

    <div class="card">
        <div class="contact-method">
            <i class="fas fa-envelope-open-text"></i>
            <h3>Email Support</h3>
            <p>myemail@gmail.com</p>
        </div>

        <div class="contact-method">
            <i class="fab fa-github"></i>
            <h3>Open Source</h3>
            <a href="https://github.com/" target="_blank" class="social-link">
                <i class="fab fa-github"></i> Visit GitHub Profile
            </a>
        </div>

        <div class="response-time">
            <i class="fas fa-clock"></i> We typically respond within 24-48 hours.
        </div>
    </div>

    <footer>
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Calculator
        </a>
    </footer>
</div>

</body>
</html>
